services:
  courier-service:
    build:
      context: ..
      dockerfile: courier-service/Dockerfile
    stdin_open: true
    entrypoint: ["node", "courier-service-cli/bin/courier-service"]

  courier-api:
    build:
      context: ..
      dockerfile: courier-service/Dockerfile
    entrypoint: ["node", "courier-service-api/dist/index.js"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
