AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Courier Service Frontend — S3 static hosting + CloudFront CDN + WAF.
  Serves React/Vue/Svelte builds from S3 prefixes; framework switching
  is done by updating the CloudFront default root object via the
  switch-framework.sh script.

Parameters:
  Environment:
    Type: String
    Default: staging
    AllowedValues: [staging, production]
  ActiveFramework:
    Type: String
    Default: react
    AllowedValues: [react, vue, svelte]
    Description: Which framework build to serve by default

Resources:
  # ── WAF ──────────────────────────────────────────────────────────────
  FrontendWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub courier-frontend-waf-${Environment}
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub CourierFrontendWAF${Environment}
      Rules:
        - Name: RateLimitRule
          Priority: 1
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: FrontendRateLimit
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
        - Name: AWSManagedCommonRuleSet
          Priority: 2
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: FrontendCommonRules
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
        - Name: AWSManagedKnownBadInputs
          Priority: 3
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: FrontendKnownBadInputs
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet

  # ── S3 Bucket ───────────────────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub courier-frontend-${Environment}-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET]
            AllowedOrigins: ['*']
            AllowedHeaders: ['*']
            MaxAge: 3600

  # S3 bucket policy — allow CloudFront OAC only
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}

  # ── CloudFront OAC ──────────────────────────────────────────────────
  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub courier-frontend-oac-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── CloudFront Distribution ─────────────────────────────────────────
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub Courier Service Frontend (${Environment})
        DefaultRootObject: index.html
        WebACLId: !GetAtt FrontendWebACL.Arn
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOAC
            OriginPath: !Sub /${ActiveFramework}
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf  # CORS-S3Origin
        CustomErrorResponses:
          # SPA fallback — serve index.html for 403/404 (client-side routing)
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        PriceClass: PriceClass_100
        HttpVersion: http2and3

Outputs:
  FrontendURL:
    Description: CloudFront URL for the frontend
    Value: !Sub https://${FrontendDistribution.DomainName}
    Export:
      Name: !Sub ${AWS::StackName}-FrontendURL

  FrontendDistributionId:
    Description: CloudFront distribution ID (needed for invalidation)
    Value: !Ref FrontendDistribution
    Export:
      Name: !Sub ${AWS::StackName}-DistributionId

  FrontendBucketName:
    Description: S3 bucket name for frontend assets
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub ${AWS::StackName}-BucketName

  ActiveFramework:
    Description: Currently active frontend framework
    Value: !Ref ActiveFramework
