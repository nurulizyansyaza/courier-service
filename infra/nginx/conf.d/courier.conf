# Courier Service — backend nginx (runs in the courier-nginx container).
#
# Published on localhost:8090; the Cloudflare Tunnel routes both subdomains here:
#   courier-service.nurulizyansyaza.com          -> courier-nginx
#   staging-courier-service.nurulizyansyaza.com  -> courier-nginx
#
# Routes (per subdomain):
#   /api/      -> API container (prod: courier-api, staging: courier-api-staging)
#   /react/    -> framework build  (prod|staging)
#   /vue/      -> framework build  (prod|staging)
#   /svelte/   -> framework build  (prod|staging)
#   /cli       -> static CLI page
#   /          -> static landing page

# ── Health / catch-all (default server) ─────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Reject unknown hosts.
    location / {
        return 444;
    }
}

# ── Production — courier-service.nurulizyansyaza.com ─────────────────
server {
    listen 80;
    server_name courier-service.nurulizyansyaza.com;

    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    real_ip_header CF-Connecting-IP;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/courier-prod-access.log;
    error_log  /var/log/nginx/courier-prod-error.log;

    client_max_body_size 10M;

    location /api/ {
        set $courier_api courier-api:3000;
        proxy_pass http://$courier_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }

    location /react/ {
        alias /var/www/frontend-builds/prod/react/;
        try_files $uri $uri/ /react/index.html;
    }
    location /vue/ {
        alias /var/www/frontend-builds/prod/vue/;
        try_files $uri $uri/ /vue/index.html;
    }
    location /svelte/ {
        alias /var/www/frontend-builds/prod/svelte/;
        try_files $uri $uri/ /svelte/index.html;
    }

    location = /cli {
        root /var/www/static;
        try_files /cli.html =404;
    }
    location = / {
        root /var/www/static;
        try_files /index.html =404;
    }
}

# ── Staging — staging-courier-service.nurulizyansyaza.com ───────────
server {
    listen 80;
    server_name staging-courier-service.nurulizyansyaza.com;

    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    real_ip_header CF-Connecting-IP;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/courier-staging-access.log;
    error_log  /var/log/nginx/courier-staging-error.log;

    client_max_body_size 10M;

    location /api/ {
        set $courier_api_staging courier-api-staging:3000;
        proxy_pass http://$courier_api_staging;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }

    location /react/ {
        alias /var/www/frontend-builds/staging/react/;
        try_files $uri $uri/ /react/index.html;
    }
    location /vue/ {
        alias /var/www/frontend-builds/staging/vue/;
        try_files $uri $uri/ /vue/index.html;
    }
    location /svelte/ {
        alias /var/www/frontend-builds/staging/svelte/;
        try_files $uri $uri/ /svelte/index.html;
    }

    location = /cli {
        root /var/www/static;
        try_files /cli-staging.html =404;
    }
    location = / {
        root /var/www/static;
        try_files /index-staging.html =404;
    }
}
