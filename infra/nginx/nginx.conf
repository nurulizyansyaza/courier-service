# Top-level Nginx config for the courier-nginx container.
#
# Architecture (homelab):
#   Cloudflare Tunnel ─▶ courier-nginx (localhost:8090)
#     ├─ courier-service.nurulizyansyaza.com          ─▶ courier-nginx
#     └─ staging-courier-service.nurulizyansyaza.com  ─▶ courier-nginx
#
# This container (courier-nginx) serves the framework frontends + static
# landing/CLI pages and reverse-proxies /api/ to the API containers.
# Per-subdomain server blocks live in conf.d/courier.conf.

user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Docker embedded DNS — resolve API upstreams at request time so a
    # stopped/missing API container yields a 502 instead of breaking reload.
    resolver 127.0.0.11 valid=10s ipv6=off;

    include /etc/nginx/conf.d/*.conf;
}
