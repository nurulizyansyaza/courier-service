# Nginx location blocks for Courier Service — Sub-path deployment
#
# Include this file in your existing server block for nurulizyansyaza.com:
#
#   server {
#       listen 80;
#       server_name nurulizyansyaza.com;
#       ...
#       include /etc/nginx/snippets/courier-service.conf;
#   }
#
# Architecture:
#   /courier-service/api/*            → Docker API container (prod, port 3000)
#   /courier-service/frontend/*       → Static frontend builds
#   /courier-service/cli              → CLI documentation page
#   /courier-service/                 → Project landing page
#   /staging/courier-service/...      → Same structure, staging API on port 3001
#
# Prerequisites:
#   - Docker API containers running (docker-compose.prod.yml)
#   - Frontend builds deployed to /opt/courier-service/frontend-builds/{prod,staging}/
#   - Static pages deployed to /opt/courier-service/static/

# ── Rate Limiting Zones ──────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=cs_global:10m rate=200r/m;
limit_req_zone $binary_remote_addr zone=cs_api:10m rate=60r/m;

# ── Upstreams ────────────────────────────────────────────────────────
upstream courier_api_prod {
    server 127.0.0.1:3000;
}

upstream courier_api_staging {
    server 127.0.0.1:3001;
}

# ══════════════════════════════════════════════════════════════════════
# PRODUCTION — /courier-service/
# ══════════════════════════════════════════════════════════════════════

# ── Landing Page ─────────────────────────────────────────────────────
location = /courier-service/ {
    alias /opt/courier-service/static/;
    try_files index.html =404;
    add_header Cache-Control "public, max-age=0, must-revalidate";
}

location = /courier-service {
    return 301 /courier-service/;
}

# ── API Proxy (strips /courier-service prefix) ──────────────────────
location /courier-service/api/ {
    limit_req zone=cs_api burst=20 nodelay;

    proxy_pass http://courier_api_prod/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    add_header Cache-Control "no-store, no-cache, must-revalidate";
}

# ── Frontend — Redirect root to default framework ───────────────────
location = /courier-service/frontend/ {
    return 302 /courier-service/frontend/react/;
}

location = /courier-service/frontend {
    return 302 /courier-service/frontend/react/;
}

# ── Frontend — Static files + SPA routing per framework ─────────────
location ~ ^/courier-service/frontend/(react|vue|svelte)(/.*)?$ {
    limit_req zone=cs_global burst=50 nodelay;

    alias /opt/courier-service/frontend-builds/prod/$1/;

    # Cache static assets aggressively (JS, CSS, images, fonts)
    location ~* ^/courier-service/frontend/(react|vue|svelte)/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        alias /opt/courier-service/frontend-builds/prod/$1/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback: non-asset paths → index.html
    try_files $uri $uri/ /courier-service/frontend/$1/index.html;

    # index.html should never be cached
    location ~* ^/courier-service/frontend/(react|vue|svelte)/index\.html$ {
        alias /opt/courier-service/frontend-builds/prod/$1/index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
}

# ── CLI Documentation Page ───────────────────────────────────────────
location = /courier-service/cli {
    alias /opt/courier-service/static/cli.html;
    add_header Cache-Control "public, max-age=0, must-revalidate";
}

# ── Security Headers (applied to all /courier-service/ routes) ──────
location /courier-service/ {
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

# ══════════════════════════════════════════════════════════════════════
# STAGING — /staging/courier-service/
# ══════════════════════════════════════════════════════════════════════

location = /staging/courier-service/ {
    alias /opt/courier-service/static/;
    try_files index-staging.html =404;
    add_header Cache-Control "public, max-age=0, must-revalidate";
}

location = /staging/courier-service {
    return 301 /staging/courier-service/;
}

location /staging/courier-service/api/ {
    limit_req zone=cs_api burst=20 nodelay;

    proxy_pass http://courier_api_staging/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    add_header Cache-Control "no-store, no-cache, must-revalidate";
}

location = /staging/courier-service/frontend/ {
    return 302 /staging/courier-service/frontend/react/;
}

location = /staging/courier-service/frontend {
    return 302 /staging/courier-service/frontend/react/;
}

location ~ ^/staging/courier-service/frontend/(react|vue|svelte)(/.*)?$ {
    limit_req zone=cs_global burst=50 nodelay;

    alias /opt/courier-service/frontend-builds/staging/$1/;

    location ~* ^/staging/courier-service/frontend/(react|vue|svelte)/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        alias /opt/courier-service/frontend-builds/staging/$1/;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    try_files $uri $uri/ /staging/courier-service/frontend/$1/index.html;

    location ~* ^/staging/courier-service/frontend/(react|vue|svelte)/index\.html$ {
        alias /opt/courier-service/frontend-builds/staging/$1/index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
}

location = /staging/courier-service/cli {
    alias /opt/courier-service/static/cli-staging.html;
    add_header Cache-Control "public, max-age=0, must-revalidate";
}

# ── Block dotfiles ───────────────────────────────────────────────────
location ~ ^/(courier-service|staging/courier-service)/\. {
    deny all;
    access_log off;
    log_not_found off;
}
