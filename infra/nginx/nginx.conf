# Nginx server blocks for Courier Service — Subdomain deployment
#
# These configs are managed on the server at:
#   /etc/nginx/sites-enabled/courier-service.nurulizyansyaza.com
#   /etc/nginx/conf.d/courier-service.conf (rate limiting zones)
#
# Architecture:
#   courier-service.nurulizyansyaza.com         → Production
#   staging-courier-service.nurulizyansyaza.com  → Staging
#
#   /api/*            → Docker API container (prod: port 3000, staging: port 3001)
#   /frontend/*       → Static frontend builds
#   /cli              → CLI documentation page
#   /                 → Project landing page
#
# Prerequisites:
#   - Docker API containers running (docker-compose.prod.yml)
#   - Frontend builds deployed to /opt/courier-service/frontend-builds/{prod,staging}/
#   - Static pages deployed to /opt/courier-service/static/
#   - Cloudflare Tunnel routing subdomains to localhost:80

# ── Rate Limiting Zones (http-level, in /etc/nginx/conf.d/courier-service.conf) ──
# limit_req_zone $binary_remote_addr zone=cs_global:10m rate=200r/m;
# limit_req_zone $binary_remote_addr zone=cs_api:10m rate=60r/m;

# ══════════════════════════════════════════════════════════════════════
