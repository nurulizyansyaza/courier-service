name: Trigger Staging Deploy

# This workflow lives on `main` so it can receive repository_dispatch events
# (GitHub only triggers repository_dispatch on the default branch).
# It re-triggers the actual deploy-staging.yml workflow on the staging branch.

on:
  repository_dispatch:
    types: [sub-repo-updated]

jobs:
  trigger:
    name: Trigger deploy-staging workflow
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to staging branch
        run: |
          gh workflow run deploy-staging.yml \
            --ref staging \
            -f deploy_target=all
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
