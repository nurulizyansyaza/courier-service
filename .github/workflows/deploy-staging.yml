name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: What to deploy
        required: true
        type: choice
        options:
          - all
          - api-only
          - frontend-only
      framework:
        description: Active frontend framework
        required: false
        type: choice
        default: react
        options:
          - react
          - vue
          - svelte
  workflow_call:
    inputs:
      deploy_target:
        type: string
        default: all

permissions:
  contents: read

env:
  HOMELAB_DEPLOY_PATH: /opt/courier-service
  HOMELAB_DOMAIN: staging-courier-service.nurulizyansyaza.com
  ENVIRONMENT: staging
  CORE_REF: main
  CLI_REF: main
  API_REF: main
  FRONTEND_REF: main

jobs:
  # ── Run Tests First ────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/courier-service-core
          ref: ${{ env.CORE_REF }}
          path: courier-service-core
      - uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/courier-service-cli
          ref: ${{ env.CLI_REF }}
          path: courier-service-cli
      - uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/courier-service-api
          ref: ${{ env.API_REF }}
          path: courier-service-api
      - uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/courier-service-frontend
          ref: ${{ env.FRONTEND_REF }}
          path: courier-service-frontend

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test Core
        run: cd courier-service-core && npm ci && npm run build && npm test

      - name: Test CLI
        run: cd courier-service-cli && npm ci && npm test

      - name: Test API
        run: cd courier-service-api && npm ci && npm test

      - name: Test Frontend
        run: |
          cd courier-service-frontend && npm ci
          echo '{"framework":"react"}' > framework.config.json
          node -e "
            const fs = require('fs');
            const tsconfig = JSON.parse(fs.readFileSync('tsconfig.json', 'utf-8'));
            tsconfig.compilerOptions.jsx = 'react-jsx';
            tsconfig.include = ['src/core', 'src/react', 'src/vite-env.d.ts'];
            fs.writeFileSync('tsconfig.json', JSON.stringify(tsconfig, null, 2) + '\n');
          "
          npm test

  # ── Deploy Staging API ─────────────────────────────────────────────
  deploy-api:
    name: Deploy Staging API
    needs: test
    runs-on: ubuntu-latest
    if: inputs.deploy_target != 'frontend-only'
    steps:
      - uses: actions/checkout@v4
        with:
          path: courier-service
      - uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/courier-service-core
          ref: ${{ env.CORE_REF }}
          path: courier-service-core
      - uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/courier-service-cli
          ref: ${{ env.CLI_REF }}
          path: courier-service-cli
      - uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/courier-service-api
          ref: ${{ env.API_REF }}
          path: courier-service-api

      - name: Set up SSH via Cloudflare Tunnel
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMELAB_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<EOF
          Host ${{ secrets.HOMELAB_HOST }}
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Build Docker image
        run: |
          IMAGE_TAG="courier-service-api:staging-${{ github.sha }}"
          docker build \
            -f courier-service/Dockerfile \
            -t "$IMAGE_TAG" \
            -t "courier-service-api:latest" \
            .

      - name: Transfer image to homelab
        run: |
          docker save "courier-service-api:latest" | \
            ssh ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }} "docker load"

      - name: Copy config files
        run: |
          scp courier-service/docker-compose.prod.yml \
            ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }}:${{ env.HOMELAB_DEPLOY_PATH }}/courier-service/
          scp courier-service/infra/nginx/nginx.conf \
            ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }}:${{ env.HOMELAB_DEPLOY_PATH }}/courier-service/infra/nginx/

      - name: Copy staging static pages
        run: |
          scp courier-service/static/index-staging.html \
            ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }}:${{ env.HOMELAB_DEPLOY_PATH }}/static/
          scp courier-service/static/cli-staging.html \
            ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }}:${{ env.HOMELAB_DEPLOY_PATH }}/static/

      - name: Restart staging API service
        run: |
          ssh ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }} bash -s <<'EOF'
            set -euo pipefail
            cd ${{ env.HOMELAB_DEPLOY_PATH }}/courier-service
            docker compose -f docker-compose.prod.yml up -d --no-deps courier-api-staging
            sleep 5
            curl -sf http://localhost:3001/api/health || exit 1
            echo "::notice::Staging API deployed successfully"
          EOF

      - name: Reload Nginx
        run: |
          ssh ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }} "sudo nginx -t && sudo systemctl reload nginx"

      - name: Print staging API URL
        run: echo "::notice::Staging API deployed to https://${{ env.HOMELAB_DOMAIN }}/api/health"

  # ── Deploy Staging Frontend ────────────────────────────────────────
  deploy-frontend:
    name: Deploy Staging Frontend
    needs: test
    runs-on: ubuntu-latest
    if: inputs.deploy_target != 'api-only'
    steps:
      - uses: actions/checkout@v4
        with:
          path: courier-service
      - uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/courier-service-core
          ref: ${{ env.CORE_REF }}
          path: courier-service-core
      - uses: actions/checkout@v4
        with:
          repository: nurulizyansyaza/courier-service-frontend
          ref: ${{ env.FRONTEND_REF }}
          path: courier-service-frontend

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up SSH via Cloudflare Tunnel
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          mkdir -p ~/.ssh
          echo "${{ secrets.HOMELAB_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<EOF
          Host ${{ secrets.HOMELAB_HOST }}
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Install dependencies
        run: |
          cd courier-service-core && npm ci && npm run build
          cd ../courier-service-frontend && npm ci

      - name: Build and deploy React
        run: |
          cd courier-service-frontend
          npm run use:react
          VITE_API_BASE_URL=/api npx vite build --base=/react/
          rsync -az --delete dist/ \
            ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }}:${{ env.HOMELAB_DEPLOY_PATH }}/frontend-builds/staging/react/

      - name: Build and deploy Vue
        run: |
          cd courier-service-frontend
          npm run use:vue
          VITE_API_BASE_URL=/api npx vite build --base=/vue/
          rsync -az --delete dist/ \
            ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }}:${{ env.HOMELAB_DEPLOY_PATH }}/frontend-builds/staging/vue/

      - name: Build and deploy Svelte
        run: |
          cd courier-service-frontend
          npm run use:svelte
          VITE_API_BASE_URL=/api npx vite build --base=/svelte/
          rsync -az --delete dist/ \
            ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }}:${{ env.HOMELAB_DEPLOY_PATH }}/frontend-builds/staging/svelte/

      - name: Reload Nginx
        run: |
          ssh ${{ secrets.HOMELAB_USER }}@${{ secrets.HOMELAB_HOST }} "sudo nginx -t && sudo systemctl reload nginx"

      - name: Print staging frontend URL
        run: echo "::notice::Staging frontend deployed to https://${{ env.HOMELAB_DOMAIN }}/react/"
