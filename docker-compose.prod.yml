# Production stack for Homelab deployment
#
# Architecture:
#   Cloudflare Tunnel ─▶ courier-nginx (localhost:8090)
#     ├─ courier-service.nurulizyansyaza.com          ─▶ courier-nginx
#     └─ staging-courier-service.nurulizyansyaza.com  ─▶ courier-nginx
#
#   courier-nginx serves the framework frontends + static landing/CLI pages
#   from /data/courier-service/ and reverse-proxies /api/ to the API
#   containers (prod: courier-api:3000, staging: courier-api-staging:3000).
# Production: courier-service.nurulizyansyaza.com
# Staging: staging-courier-service.nurulizyansyaza.com
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d              # Start all services
#   docker compose -f docker-compose.prod.yml up -d --build      # Rebuild and start
#   docker compose -f docker-compose.prod.yml down                # Stop all services
#   docker compose -f docker-compose.prod.yml logs -f             # Follow logs
#   docker compose -f docker-compose.prod.yml logs courier-api    # API logs only

services:
  # ── Production API (port 3000) ───────────────────────────────────────
  courier-api:
    image: courier-service-api:latest
    container_name: courier-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PRODUCTION_DOMAIN=courier-service.nurulizyansyaza.com
    networks:
      - courier-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Staging API (port 3001) ──────────────────────────────────────────
  courier-api-staging:
    image: courier-service-api:latest
    container_name: courier-api-staging
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=staging
      - PORT=3000
      - PRODUCTION_DOMAIN=courier-service.nurulizyansyaza.com
    networks:
      - courier-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Reverse proxy / static server ────────────────────────────────────
  # Published on localhost:8090; the Cloudflare Tunnel routes
  #   courier-service.nurulizyansyaza.com          -> http://localhost:8090
  #   staging-courier-service.nurulizyansyaza.com  -> http://localhost:8090
  courier-nginx:
    image: nginx:alpine
    container_name: courier-nginx
    depends_on:
      - courier-api
      - courier-api-staging
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - ../frontend-builds:/var/www/frontend-builds:ro
      - ../static:/var/www/static:ro
    networks:
      - courier-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  # Private network between courier-nginx and the API containers.
  courier-internal:
    driver: bridge
