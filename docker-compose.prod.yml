# Production stack for Homelab deployment
#
# Architecture:
#   Host Nginx (nurulizyansyaza.com) → API Docker containers
#   Host Nginx serves static files directly from /opt/courier-service/
#
# The host Nginx includes courier-service/infra/nginx/nginx.conf as a snippet
# for routing /courier-service/* and /staging/courier-service/* paths.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d              # Start all services
#   docker compose -f docker-compose.prod.yml up -d --build      # Rebuild and start
#   docker compose -f docker-compose.prod.yml down                # Stop all services
#   docker compose -f docker-compose.prod.yml logs -f             # Follow logs
#   docker compose -f docker-compose.prod.yml logs courier-api    # API logs only

services:
  # ── Production API (port 3000) ───────────────────────────────────────
  courier-api:
    build:
      context: ..
      dockerfile: courier-service/Dockerfile
    container_name: courier-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PRODUCTION_DOMAIN=nurulizyansyaza.com
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Staging API (port 3001) ──────────────────────────────────────────
  courier-api-staging:
    build:
      context: ..
      dockerfile: courier-service/Dockerfile
    container_name: courier-api-staging
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=staging
      - PORT=3000
      - PRODUCTION_DOMAIN=nurulizyansyaza.com
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
